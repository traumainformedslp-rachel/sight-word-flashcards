<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sight Word Flashcards · Montessori Grammar</title>
<meta name="description" content="Interactive sight word flashcards with Montessori grammar color coding. The first 100 children's picture book sight words (Green et al., 2024).">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --card-bg: #111;
    --border: #1e1e1e;
    --text: #e8e8e8;
    --text-muted: #999;
    --text-dim: #555;
    --text-sub: #888;
    --pill-border: #333;
    --pill-hover-border: #666;
    --pill-hover-text: #ddd;
    --pill-active-bg: #fff;
    --pill-active-text: #000;
    --legend-toggle-border: #282828;
    --legend-toggle-text: #666;
    --legend-toggle-hover-border: #444;
    --legend-toggle-hover-text: #999;
    --legend-desc-color: #666;
    --progress-track: #1a1a1a;
    --progress-stats: #444;
    --done-border: #222;
    --done-title-color: #fff;
    --done-stats-color: #666;
    --btn-learning-bg: #1c1c1c;
    --btn-learning-border: #2a2a2a;
    --btn-known-bg: #fff;
    --btn-known-text: #000;
    --keyboard-hints: #333;
  }

  [data-theme="light"] {
    --bg: #f5f5f0;
    --card-bg: #ffffff;
    --border: #e0e0e0;
    --text: #222;
    --text-muted: #666;
    --text-dim: #999;
    --text-sub: #777;
    --pill-border: #ccc;
    --pill-hover-border: #999;
    --pill-hover-text: #333;
    --pill-active-bg: #222;
    --pill-active-text: #fff;
    --legend-toggle-border: #ccc;
    --legend-toggle-text: #888;
    --legend-toggle-hover-border: #999;
    --legend-toggle-hover-text: #555;
    --legend-desc-color: #888;
    --progress-track: #e0e0e0;
    --progress-stats: #999;
    --done-border: #e0e0e0;
    --done-title-color: #222;
    --done-stats-color: #888;
    --btn-learning-bg: #fff;
    --btn-learning-border: #e0e0e0;
    --btn-known-bg: #222;
    --btn-known-text: #fff;
    --keyboard-hints: #bbb;
  }

  html { -webkit-text-size-adjust: 100%; }
  body {
    min-height: 100vh;
    min-height: 100dvh;
    background: var(--bg);
    font-family: 'Outfit', sans-serif;
    color: var(--text);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px calc(24px + env(safe-area-inset-bottom));
    overflow-x: hidden;
    overscroll-behavior-y: contain;
    transition: background 0.3s, color 0.3s;
    -webkit-tap-highlight-color: transparent;
  }
  button { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }

  .header { width: 100%; max-width: 680px; margin-bottom: 24px; }

  .title-row {
    display: flex; align-items: center;
    justify-content: space-between; margin-bottom: 6px;
  }
  .title-left { display: flex; align-items: baseline; gap: 12px; }
  .title {
    font-family: 'Space Mono', monospace; font-size: 14px; font-weight: 700;
    letter-spacing: 4px; text-transform: uppercase; color: var(--text-dim);
  }
  .subtitle {
    font-size: 10px; font-family: 'Space Mono', monospace;
    color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase;
  }
  .review-badge {
    font-size: 11px; font-family: 'Space Mono', monospace;
    letter-spacing: 2px; display: none;
  }
  .review-badge.visible { display: inline; }

  /* Theme toggle */
  .theme-toggle {
    background: transparent; border: 1px solid var(--pill-border); border-radius: 20px;
    color: var(--text-muted); padding: 6px 14px; cursor: pointer;
    font-family: 'Space Mono', monospace; font-size: 11px; transition: all 0.2s;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .theme-toggle:hover { border-color: var(--pill-hover-border); color: var(--pill-hover-text); }

  /* Pills */
  .pills { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .pill {
    padding: 8px 14px; border-radius: 20px; border: 1px solid var(--pill-border);
    background: transparent; color: var(--text-muted); cursor: pointer; font-size: 12px;
    font-family: 'Space Mono', monospace; transition: all 0.2s; white-space: nowrap;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .pill:hover { border-color: var(--pill-hover-border); color: var(--pill-hover-text); }
  .pill.active { background: var(--pill-active-bg); color: var(--pill-active-text); border-color: var(--pill-active-bg); }
  .pill-dot {
    width: 7px; height: 7px; border-radius: 50%; display: inline-block;
  }

  /* Controls row */
  .controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .legend-toggle {
    background: transparent; border: 1px solid var(--legend-toggle-border); border-radius: 8px;
    color: var(--legend-toggle-text); padding: 6px 14px; cursor: pointer;
    font-family: 'Space Mono', monospace; font-size: 11px; transition: all 0.2s;
  }
  .legend-toggle:hover { border-color: var(--legend-toggle-hover-border); color: var(--legend-toggle-hover-text); }

  /* Legend */
  .legend {
    background: var(--card-bg); border-radius: 12px; padding: 16px 20px;
    margin-bottom: 16px; border: 1px solid var(--border);
    display: none; transition: background 0.3s, border-color 0.3s;
  }
  .legend.open { display: block; }
  .legend-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2px 24px; }
  .legend-item { display: flex; align-items: center; gap: 10px; padding: 6px 0; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .legend-label { font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700; }
  .legend-desc { font-family: 'Outfit', sans-serif; font-size: 11px; color: var(--legend-desc-color); margin-left: 6px; }

  /* Progress */
  .progress-track { height: 3px; background: var(--progress-track); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease, background 0.4s ease; }
  .progress-stats {
    display: flex; justify-content: space-between; margin-top: 8px;
    font-family: 'Space Mono', monospace; font-size: 11px; color: var(--progress-stats);
  }
  .stat-known { color: #4ade80; }
  .stat-learning { color: #f87171; }

  /* Card */
  .card-area { width: 100%; max-width: 560px; }
  .card {
    width: 100%; aspect-ratio: 16/10; border-radius: 20px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    cursor: pointer; position: relative; overflow: hidden;
    transition: background 0.4s ease;
    user-select: none; -webkit-user-select: none;
    touch-action: manipulation;
  }
  .card-accent-bar {
    position: absolute; top: 10px; left: 28px; right: 28px;
    height: 2.5px; border-radius: 2px;
  }
  .card-number {
    position: absolute; top: 22px; left: 24px;
    font-family: 'Space Mono', monospace; font-size: 12px; opacity: 0.7;
  }
  .card-pos {
    position: absolute; top: 20px; right: 24px;
    font-family: 'Space Mono', monospace; font-size: 11px;
    font-weight: 700; letter-spacing: 1px;
  }
  .card-hint {
    position: absolute; bottom: 16px; right: 24px;
    font-family: 'Space Mono', monospace; font-size: 10px;
    opacity: 0.2; letter-spacing: 2px;
  }
  .card-brand {
    position: absolute; bottom: 16px; left: 24px;
    font-family: 'Space Mono', monospace; font-size: 9px;
    opacity: 0.2; letter-spacing: 1px;
  }
  .card-word {
    font-family: 'Outfit', sans-serif; font-weight: 800;
    letter-spacing: -2px; transition: all 0.3s ease;
    max-width: 92%; text-align: center; line-height: 1;
    word-break: break-word;
  }
  .card-word.short { font-size: clamp(56px, 16vw, 96px); }
  .card-word.long  { font-size: clamp(40px, 12vw, 72px); }
  .card-back { text-align: center; padding: 0 clamp(16px, 6vw, 40px); max-width: 100%; }
  .card-back-word {
    font-family: 'Outfit', sans-serif; font-weight: 300;
    font-size: clamp(16px, 4.5vw, 20px); opacity: 0.5; margin-bottom: 8px;
  }
  .card-back-pos {
    font-family: 'Space Mono', monospace; font-size: clamp(10px, 2.8vw, 12px);
    opacity: 0.5; margin-bottom: 16px;
  }
  .card-back-sentence {
    font-family: 'Outfit', sans-serif; font-weight: 400;
    font-size: clamp(18px, 5.2vw, 28px); line-height: 1.4;
  }

  /* Done state */
  .done-card {
    width: 100%; aspect-ratio: 16/10; background: var(--card-bg); border-radius: 20px;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; border: 1px solid var(--done-border);
    transition: background 0.3s, border-color 0.3s;
  }
  .done-emoji { font-size: 48px; margin-bottom: 16px; }
  .done-title { font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 28px; color: var(--done-title-color); margin-bottom: 8px; }
  .done-stats { font-family: 'Space Mono', monospace; font-size: 13px; color: var(--done-stats-color); margin-bottom: 24px; }

  /* Buttons */
  .actions { display: flex; gap: 16px; margin-top: 28px; width: 100%; max-width: 560px; }
  .btn {
    padding: 14px 32px; border-radius: 12px; border: none; cursor: pointer;
    font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 15px;
    transition: all 0.2s; text-transform: uppercase; letter-spacing: 1px;
    min-height: 48px;
  }
  .btn:hover { transform: translateY(-2px); }
  .btn:active { transform: translateY(0); }
  .btn-learning { background: var(--btn-learning-bg); color: #f87171; border: 1px solid var(--btn-learning-border); }
  .btn-known { background: var(--btn-known-bg); color: var(--btn-known-text); }

  .keyboard-hints {
    margin-top: 24px; font-family: 'Space Mono', monospace;
    font-size: 10px; color: var(--keyboard-hints); letter-spacing: 1px; text-align: center;
  }

  /* Control group (right-aligned buttons in the controls row) */
  .control-group { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }

  /* Traffic-light dot cluster on the Start Over button */
  .traffic-lights { display: inline-flex; gap: 3px; margin-right: 2px; }
  .traffic-lights .tl {
    width: 6px; height: 6px; border-radius: 50%;
    background: currentColor; opacity: 0.35;
    transition: opacity 0.25s, transform 0.25s;
  }
  #startOverBtn:hover .tl.r { background: #E63946; opacity: 1; }
  #startOverBtn:hover .tl.y { background: #E8A12D; opacity: 1; transition-delay: 0.08s; }
  #startOverBtn:hover .tl.g { background: #27AE60; opacity: 1; transition-delay: 0.16s; }
  #startOverBtn.flash .tl.r { background: #E63946; opacity: 1; animation: tlPulse 0.6s ease; }
  #startOverBtn.flash .tl.y { background: #E8A12D; opacity: 1; animation: tlPulse 0.6s ease 0.15s; }
  #startOverBtn.flash .tl.g { background: #27AE60; opacity: 1; animation: tlPulse 0.6s ease 0.3s; }
  @keyframes tlPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.6); } }

  /* Animations */
  @keyframes slideLeft { from { opacity:1; transform:translateX(0); } to { opacity:0; transform:translateX(-120px); } }
  @keyframes slideRight { from { opacity:1; transform:translateX(0); } to { opacity:0; transform:translateX(120px); } }
  @keyframes fadeIn { from { opacity:0; transform:scale(0.95); } to { opacity:1; transform:scale(1); } }
  .anim-enter { animation: fadeIn 0.3s ease-out; }
  .anim-exit-left { animation: slideLeft 0.3s ease-in forwards; }
  .anim-exit-right { animation: slideRight 0.3s ease-in forwards; }

  /* Print sheet (hidden on screen, visible when printing) */
  .print-sheets { display: none; }
  .print-sheets .print-cover {
    padding: 40px 32px; border-bottom: 2px solid #000;
  }
  .print-sheets .print-cover h1 {
    font-family: 'Outfit', sans-serif; font-weight: 800;
    font-size: 28px; margin-bottom: 6px; color: #000;
  }
  .print-sheets .print-cover p {
    font-family: 'Space Mono', monospace; font-size: 11px;
    color: #444; letter-spacing: 1px; margin-bottom: 4px;
  }
  .print-sheets .print-key {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 4px 14px; margin-top: 14px;
  }
  .print-sheets .print-key-item {
    display: flex; align-items: center; gap: 8px;
    font-family: 'Space Mono', monospace; font-size: 10px; color: #222;
  }
  .print-sheets .print-key-dot {
    width: 10px; height: 10px; border-radius: 50%;
  }
  .print-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px; padding: 16px;
  }
  .print-card {
    border: 2px solid #000; border-radius: 10px;
    aspect-ratio: 3/2;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    position: relative; padding: 10px;
    page-break-inside: avoid; break-inside: avoid;
  }
  .print-card-bar {
    position: absolute; top: 6px; left: 10px; right: 10px; height: 3px; border-radius: 2px;
  }
  .print-card-num {
    position: absolute; top: 10px; left: 12px;
    font-family: 'Space Mono', monospace; font-size: 9px;
  }
  .print-card-pos {
    position: absolute; top: 10px; right: 12px;
    font-family: 'Space Mono', monospace; font-size: 9px;
    font-weight: 700; letter-spacing: 1px;
  }
  .print-card-word {
    font-family: 'Outfit', sans-serif; font-weight: 800;
    font-size: 54px; letter-spacing: -1.5px; text-align: center;
  }
  .print-card-sent {
    position: absolute; bottom: 10px; left: 12px; right: 12px;
    font-family: 'Outfit', sans-serif; font-size: 11px;
    text-align: center; font-style: italic;
  }

  @media print {
    @page { margin: 0.4in; size: letter; }
    body {
      background: #fff !important; color: #000 !important;
      padding: 0 !important; display: block !important;
    }
    .header, .card-area, .actions, .keyboard-hints, .theme-toggle,
    body > div:not(.print-sheets):not(.header) { display: none !important; }
    .print-sheets { display: block !important; }
    .print-grid { page-break-after: always; }
  }

  @media (max-width: 600px) {
    body { padding: 12px 12px calc(12px + env(safe-area-inset-bottom)); }
    .header { margin-bottom: 12px; }

    /* Horizontally scrollable filter pills (no wrap) */
    .pills {
      flex-wrap: nowrap;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scroll-snap-type: x proximity;
      margin: 0 -12px 10px;
      padding: 2px 12px 8px;
      scrollbar-width: none;
      gap: 6px;
      -webkit-mask-image: linear-gradient(90deg, transparent 0, #000 12px, #000 calc(100% - 12px), transparent 100%);
              mask-image: linear-gradient(90deg, transparent 0, #000 12px, #000 calc(100% - 12px), transparent 100%);
    }
    .pills::-webkit-scrollbar { display: none; }
    .pill { flex: 0 0 auto; scroll-snap-align: start; padding: 7px 12px; font-size: 11px; }

    .legend-grid { grid-template-columns: 1fr; }
    .btn { padding: 13px 14px; font-size: 13px; flex: 1 1 0; min-width: 0; }
    .actions { gap: 10px; margin-top: 18px; }
    .keyboard-hints { display: none; }
    .controls { flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
    .control-group { gap: 4px; }
    .control-group .pill { padding: 6px 9px; font-size: 10px; }

    /* Taller, more portrait-friendly card on phones */
    .card-area, .actions { max-width: 480px; }
    .card, .done-card { aspect-ratio: 4 / 3; }

    .card-number { top: 14px; left: 14px; font-size: 10px; }
    .card-pos { top: 12px; right: 14px; font-size: 10px; }
    .card-hint { bottom: 10px; right: 14px; font-size: 9px; letter-spacing: 1.5px; }
    .card-brand { display: none; }
    .card-accent-bar { left: 18px; right: 18px; top: 8px; }

    .title { font-size: 12px; letter-spacing: 3px; }
    .subtitle { display: none; }
    .theme-toggle { padding: 6px 10px; font-size: 10px; }
    .progress-stats { font-size: 10px; }
    .done-emoji { font-size: 40px; margin-bottom: 10px; }
    .done-title { font-size: 22px; }
    .done-stats { font-size: 11px; margin-bottom: 18px; }
  }
  @media (max-width: 380px) {
    .btn { padding: 12px 10px; font-size: 12px; letter-spacing: 0.5px; }
    .card-back-word { margin-bottom: 4px; }
    .card-back-pos { margin-bottom: 10px; }
    .card-hint { display: none; }
    .progress-stats .stat-learning,
    .progress-stats .stat-known { font-size: 10px; }
  }
</style>
</head>
<body>

<div class="header" id="header">
  <div class="title-row">
    <div class="title-left">
      <h1 class="title">SIGHT WORDS</h1>
      <span class="subtitle">MONTESSORI GRAMMAR</span>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <span class="review-badge" id="reviewBadge">REVIEW ROUND</span>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">&#9788; Light</button>
    </div>
  </div>

  <div class="pills" id="pills"></div>

  <div class="controls">
    <button class="legend-toggle" id="legendToggle">▾ Show Color Key</button>
    <div class="control-group">
      <button class="pill" id="startOverBtn" style="font-size:11px" title="Reset the deck and clear progress">
        <span class="traffic-lights" aria-hidden="true"><span class="tl r"></span><span class="tl y"></span><span class="tl g"></span></span>
        Start Over
      </button>
      <button class="pill" id="trackBtn" style="font-size:11px" title="Download a progress report (JSON)">⤓ Track</button>
      <button class="pill" id="printBtn" style="font-size:11px" title="Print free flashcards">⎙ Print</button>
      <button class="pill" id="shuffleBtn" style="font-size:11px" title="Reshuffle the current deck">↻ Shuffle</button>
    </div>
  </div>

  <div class="legend" id="legend">
    <div class="legend-grid" id="legendGrid"></div>
  </div>

  <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-stats">
    <span id="countLabel">1 / 100</span>
    <span class="stat-known" id="knownLabel">✓ 0 known</span>
    <span class="stat-learning" id="learningLabel">↻ 0 learning</span>
  </div>
</div>

<div class="card-area" id="cardArea"></div>
<div class="actions" id="actions">
  <button class="btn btn-learning" id="btnLearning">← Still Learning</button>
  <button class="btn btn-known" id="btnKnown">Got It →</button>
</div>

<div class="print-sheets" id="printSheets" aria-hidden="true"></div>

<div class="keyboard-hints">SPACE to flip · ← / → to sort · K = know · S = still learning</div>
<div style="margin-top:16px;text-align:center;">
  <a href="https://ila.onlinelibrary.wiley.com/doi/epdf/10.1002/trtr.2309" target="_blank" rel="noopener"
     style="font-family:'Space Mono',monospace;font-size:10px;color:var(--text-muted);letter-spacing:1px;text-decoration:none;border-bottom:1px solid var(--border);">
    Based on Green et al., 2024 · Read the article →
  </a>
</div>

<script>
// ===== DATA =====
const WORDS = [
  "the","and","a","to","I","you","in","of","it","he","is","was","for","on","that",
  "with","but","his","all","they","my","so","be","she","up","at","are","one","said",
  "what","this","when","we","me","have","as","do","like","out","can","her","not",
  "then","your","no","there","day","just","it's","see","little","time","from","had",
  "now","will","I'm","go","were","too","them","him","some","big","get","if","good",
  "don't","down","by","how","know","an","oh","more","their","could","about","back",
  "who","or","make","into","look","very","would","right","here","love","way","night",
  "did","new","come","our","two","want","made","over","around"
];

const WORD_POS = {
  "the":"article","and":"conjunction","a":"article","to":"preposition",
  "I":"pronoun","you":"pronoun","in":"preposition","of":"preposition",
  "it":"pronoun","he":"pronoun","is":"verb","was":"verb",
  "for":"preposition","on":"preposition","that":"pronoun",
  "with":"preposition","but":"conjunction","his":"pronoun",
  "all":"adjective","they":"pronoun","my":"pronoun","so":"adverb",
  "be":"verb","she":"pronoun","up":"adverb","at":"preposition",
  "are":"verb","one":"adjective","said":"verb","what":"pronoun",
  "this":"pronoun","when":"adverb","we":"pronoun","me":"pronoun",
  "have":"verb","as":"conjunction","do":"verb","like":"verb",
  "out":"adverb","can":"verb","her":"pronoun","not":"adverb",
  "then":"adverb","your":"pronoun","no":"adverb","there":"adverb",
  "day":"noun","just":"adverb","it's":"pronoun","see":"verb",
  "little":"adjective","time":"noun","from":"preposition","had":"verb",
  "now":"adverb","will":"verb","I'm":"pronoun","go":"verb",
  "were":"verb","too":"adverb","them":"pronoun","him":"pronoun",
  "some":"adjective","big":"adjective","get":"verb","if":"conjunction",
  "good":"adjective","don't":"verb","down":"adverb","by":"preposition",
  "how":"adverb","know":"verb","an":"article","oh":"interjection",
  "more":"adjective","their":"pronoun","could":"verb","about":"preposition",
  "back":"adverb","who":"pronoun","or":"conjunction","make":"verb",
  "into":"preposition","look":"verb","very":"adverb","would":"verb",
  "right":"adjective","here":"adverb","love":"verb","way":"noun",
  "night":"noun","did":"verb","new":"adjective","come":"verb",
  "our":"pronoun","two":"adjective","want":"verb","made":"verb",
  "over":"preposition","around":"preposition"
};

const M_DARK = {
  verb:         { bg:"#1A0A0A", accent:"#E63946", text:"#F8E0E0" },
  noun:         { bg:"#111111", accent:"#C8C8C8", text:"#EAEAEA" },

  pronoun:      { bg:"#140A1A", accent:"#9B59B6", text:"#EAD8F4" },
  preposition:  { bg:"#081A10", accent:"#27AE60", text:"#D0F0DE" },
  conjunction:  { bg:"#1A0F10", accent:"#E8A0B0", text:"#F8E8EC" },

  interjection: { bg:"#1A1608", accent:"#F1C40F", text:"#FFF8DC" }
};
const M_LIGHT = {
  verb:         { bg:"#FFF0F0", accent:"#C62828", text:"#4A1010" },
  noun:         { bg:"#F5F5F5", accent:"#555555", text:"#222222" },
  adjective:    { bg:"#EEF2FF", accent:"#2A56B0", text:"#1A2A50" },
  article:      { bg:"#EAF4FC", accent:"#4A90B8", text:"#1A3A50" },
  pronoun:      { bg:"#F5EEFA", accent:"#7B3F9B", text:"#3A1A4A" },
  preposition:  { bg:"#EAFAF0", accent:"#1E8A4A", text:"#0A3A1A" },
  conjunction:  { bg:"#FFF0F2", accent:"#C07080", text:"#4A2028" },
  adverb:       { bg:"#FFF6E8", accent:"#C07A10", text:"#4A2E08" },
  interjection: { bg:"#FFFCE8", accent:"#B8960A", text:"#3A3008" }
};
const M_META = {
  verb:         { label:"VERB",         symbol:"●", desc:"Action word" },
  noun:         { label:"NOUN",         symbol:"▲", desc:"Person, place, or thing" },
  adjective:    { label:"ADJECTIVE",    symbol:"▲", desc:"Describing word" },
  article:      { label:"ARTICLE",      symbol:"△", desc:"Noun introducer" },
  pronoun:      { label:"PRONOUN",      symbol:"▲", desc:"Stand-in word" },
  preposition:  { label:"PREPOSITION",  symbol:"☽", desc:"Position & relation" },
  conjunction:  { label:"CONJUNCTION",  symbol:"▬", desc:"Connecting word" },
  adverb:       { label:"ADVERB",       symbol:"●", desc:"Modifier (how/when/where)" },
  interjection: { label:"INTERJECTION", symbol:"!", desc:"Exclamation" }
};

let isDark = false;
function getM() {
  const colors = isDark ? M_DARK : M_LIGHT;
  const m = {};
  for (const k of Object.keys(M_META)) {
    m[k] = { ...M_META[k], ...colors[k] };
  }
  return m;
}
let M = getM();

const SENTENCES = {

  "to":"We need to leave.","I":"I will be there.","you":"Can you help?",
  "in":"She is in the room.","of":"A cup of water.","it":"Give it to me.",
  "he":"He ran fast.","is":"The sky is blue.","was":"She was happy.",
  "for":"This is for you.","on":"The cat is on the bed.","that":"Look at that!",
  "with":"Come with me.","but":"Small but strong.","his":"That is his coat.",
  "all":"We ate all of it.","they":"They went home.","my":"This is my turn.",
  "so":"I was so tired.","be":"Just be yourself.","she":"She left early.",
  "up":"Stand up now.","at":"Meet me at noon.","are":"You are kind.",
  "one":"Pick one color.","said":"He said hello.","what":"What happened?",
  "this":"Read this page.","when":"Call me when ready.","we":"We did it together.",

const FILTERS = [
  { name:"All Words", pos:null },
  { name:"Verbs", pos:"verb" },
  { name:"Pronouns", pos:"pronoun" },
  { name:"Adverbs", pos:"adverb" },
  { name:"Prepositions", pos:"preposition" },
  { name:"Adjectives", pos:"adjective" },
  { name:"Conjunctions", pos:"conjunction" },
  { name:"Articles", pos:"article" },
  { name:"Nouns", pos:"noun" }
];

// ===== STATE =====
let currentFilter = "All Words";
let deck = [];
let idx = 0;
let flipped = false;
let known = new Set();
let learning = new Set();
let mode = "study";
let animating = false;

// ===== HELPERS =====
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getFiltered(posKey) {
  if (!posKey) return [...WORDS];
  return WORDS.filter(w => WORD_POS[w] === posKey);
}

// ===== DOM REFS =====
const $pills = document.getElementById("pills");
const $legendToggle = document.getElementById("legendToggle");
const $legend = document.getElementById("legend");
const $legendGrid = document.getElementById("legendGrid");
const $shuffleBtn = document.getElementById("shuffleBtn");
const $progressFill = document.getElementById("progressFill");
const $countLabel = document.getElementById("countLabel");
const $knownLabel = document.getElementById("knownLabel");
const $learningLabel = document.getElementById("learningLabel");
const $cardArea = document.getElementById("cardArea");
const $actions = document.getElementById("actions");
const $btnLearning = document.getElementById("btnLearning");
const $btnKnown = document.getElementById("btnKnown");
const $reviewBadge = document.getElementById("reviewBadge");

// ===== BUILD UI =====
function buildPills() {
  $pills.innerHTML = "";
  FILTERS.forEach(f => {
    const btn = document.createElement("button");
    btn.className = "pill" + (currentFilter === f.name ? " active" : "");
    const pal = f.pos ? M[f.pos] : null;

    if (currentFilter === f.name && pal) {
      btn.style.background = pal.accent;
      btn.style.borderColor = pal.accent;
      btn.style.color = isDark ? "#000" : "#fff";
    }

    if (pal && currentFilter !== f.name) {
      const dot = document.createElement("span");
      dot.className = "pill-dot";
      dot.style.background = pal.accent;
      btn.appendChild(dot);
    }

    btn.appendChild(document.createTextNode(f.name));
    btn.addEventListener("click", () => { currentFilter = f.name; initDeck(); });
    $pills.appendChild(btn);
  });
}

function buildLegend() {
  $legendGrid.innerHTML = "";
  Object.entries(M).forEach(([key, m]) => {
    const item = document.createElement("div");
    item.className = "legend-item";
    item.innerHTML = `
      <div class="legend-dot" style="background:${m.accent}"></div>
      <div>
        <span class="legend-label" style="color:${m.accent}">${m.symbol} ${m.label}</span>
        <span class="legend-desc">${m.desc}</span>
      </div>`;
    $legendGrid.appendChild(item);
  });
}

// ===== RENDER =====
function render() {
  const word = deck[idx];
  const pos = word ? WORD_POS[word] : "verb";
  const pal = M[pos];
  const total = deck.length;
  const progress = total > 0 ? (idx / total) * 100 : 0;
  const wordNum = word ? WORDS.indexOf(word) + 1 : 0;
  const done = total > 0 && idx >= total - 1 && learning.size === 0 && flipped;

  // Progress
  $progressFill.style.width = progress + "%";
  $progressFill.style.background = pal ? pal.accent : "#666";
  $countLabel.textContent = `${idx + 1} / ${total}`;
  $knownLabel.textContent = `✓ ${known.size} known`;
  $learningLabel.textContent = `↻ ${learning.size} learning`;

  // Review badge
  $reviewBadge.className = "review-badge" + (mode === "review" ? " visible" : "");
  if (pal) $reviewBadge.style.color = pal.accent;

  // Card
  if (done) {
    $cardArea.innerHTML = `
      <div class="done-card">
        <div class="done-emoji">🎯</div>
        <div class="done-title">Deck Complete</div>
        <div class="done-stats">${known.size} mastered · ${learning.size} to review</div>
        <button class="btn btn-known" id="btnAgain">Go Again</button>
      </div>`;
    document.getElementById("btnAgain").addEventListener("click", initDeck);
    $actions.style.display = "none";
  } else if (word) {
    const sizeClass = word.length > 5 ? "long" : "short";
    if (!flipped) {
      $cardArea.innerHTML = `
        <div class="card anim-enter" id="theCard"
             style="background:${pal.bg};border:1px solid ${pal.accent}22">
          <div class="card-accent-bar" style="background:${pal.accent}"></div>
          <span class="card-number" style="color:${pal.accent}">#${String(wordNum).padStart(3,"0")}</span>
          <span class="card-pos" style="color:${pal.accent}">${pal.symbol} ${pal.label}</span>
          <span class="card-hint" style="color:${pal.text}">TAP TO FLIP</span>
          <span class="card-brand" style="color:${pal.accent}">MONTESSORI GRAMMAR</span>
          <span class="card-word ${sizeClass}" style="color:${pal.text};text-shadow:0 0 60px ${pal.accent}33">${word}</span>
        </div>`;
    } else {
      $cardArea.innerHTML = `
        <div class="card anim-enter" id="theCard"
             style="background:${pal.bg};border:1px solid ${pal.accent}22">
          <div class="card-accent-bar" style="background:${pal.accent}"></div>
          <span class="card-number" style="color:${pal.accent}">#${String(wordNum).padStart(3,"0")}</span>
          <span class="card-pos" style="color:${pal.accent}">${pal.symbol} ${pal.label}</span>
          <span class="card-hint" style="color:${pal.text}">EXAMPLE</span>
          <span class="card-brand" style="color:${pal.accent}">MONTESSORI GRAMMAR</span>
          <div class="card-back">
            <div class="card-back-word" style="color:${pal.text}">${word}</div>
            <div class="card-back-pos" style="color:${pal.accent}">${pal.desc}</div>
            <div class="card-back-sentence" style="color:${pal.accent}">${SENTENCES[word]}</div>
          </div>
        </div>`;
    }
    document.getElementById("theCard").addEventListener("click", flipCard);
    $actions.style.display = "flex";
  }
}

// ===== ACTIONS =====
function initDeck() {
  const f = FILTERS.find(f => f.name === currentFilter);
  deck = shuffle(getFiltered(f ? f.pos : null));
  idx = 0; flipped = false;
  known = new Set(); learning = new Set();
  mode = "study";
  buildPills();
  render();
}

function flipCard() {
  if (animating) return;
  flipped = !flipped;
  render();
}

function advance(dir) {
  if (animating) return;
  animating = true;
  const card = document.getElementById("theCard");
  if (card) card.className = "card " + (dir === "left" ? "anim-exit-left" : "anim-exit-right");

  setTimeout(() => {
    flipped = false;
    animating = false;
    if (idx < deck.length - 1) {
      idx++;
    } else if (learning.size > 0 && mode === "study") {
      deck = shuffle([...learning]);
      idx = 0;
      learning = new Set();
      mode = "review";
    }
    render();
  }, 300);
}

function markKnown() {
  if (!deck[idx] || animating) return;
  known.add(deck[idx]);
  advance("right");
}

function markLearning() {
  if (!deck[idx] || animating) return;
  learning.add(deck[idx]);
  advance("left");
}

// ===== EVENTS =====
$btnKnown.addEventListener("click", markKnown);
$btnLearning.addEventListener("click", markLearning);
$shuffleBtn.addEventListener("click", initDeck);

// Start Over — full reset with a traffic-light pulse
const $startOverBtn = document.getElementById("startOverBtn");
$startOverBtn.addEventListener("click", () => {
  $startOverBtn.classList.add("flash");
  setTimeout(() => $startOverBtn.classList.remove("flash"), 900);
  initDeck();
});

// Track — download a JSON progress report (mirrors the planner app)
const $trackBtn = document.getElementById("trackBtn");
$trackBtn.addEventListener("click", () => {
  const f = FILTERS.find(f => f.name === currentFilter);
  const total = getFiltered(f ? f.pos : null).length;
  const report = {
    app: "Sight Word Flashcards",
    date: new Date().toISOString().split("T")[0],
    timestamp: new Date().toISOString(),
    filter: currentFilter,
    mode,
    progress: {
      position: Math.min(idx + 1, deck.length),
      deckSize: deck.length,
      totalInFilter: total,
      knownCount: known.size,
      learningCount: learning.size,
      percentKnown: total ? Math.round((known.size / total) * 100) : 0
    },
    known: [...known],
    learning: [...learning]
  };
  const stamp = report.date;
  const safeFilter = currentFilter.toLowerCase().replace(/\s+/g, "-");
  const blob = new Blob([JSON.stringify(report, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `sight-words-progress-${safeFilter}-${stamp}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
});

// Print — build a print-friendly sheet of every card in the current filter
const $printBtn = document.getElementById("printBtn");
const $printSheets = document.getElementById("printSheets");
function buildPrintSheets() {
  const f = FILTERS.find(f => f.name === currentFilter);
  const words = getFiltered(f ? f.pos : null);
  const keyItems = Object.entries(M_META).map(([key, meta]) => {
    const color = M_LIGHT[key].accent;
    return `<div class="print-key-item">
      <span class="print-key-dot" style="background:${color}"></span>
      <span><strong>${meta.symbol} ${meta.label}</strong> — ${meta.desc}</span>
    </div>`;
  }).join("");

  const cards = words.map(w => {
    const pos = WORD_POS[w];
    const pal = M_LIGHT[pos];
    const meta = M_META[pos];
    const num = WORDS.indexOf(w) + 1;
    return `<div class="print-card" style="background:${pal.bg};border-color:${pal.accent}">
      <div class="print-card-bar" style="background:${pal.accent}"></div>
      <span class="print-card-num" style="color:${pal.accent}">#${String(num).padStart(3,"0")}</span>
      <span class="print-card-pos" style="color:${pal.accent}">${meta.symbol} ${meta.label}</span>
      <div class="print-card-word" style="color:${pal.text}">${w}</div>
      <div class="print-card-sent" style="color:${pal.accent}">${SENTENCES[w]}</div>
    </div>`;
  });

  const pages = [];
  const perPage = 6;
  for (let i = 0; i < cards.length; i += perPage) {
    pages.push(`<div class="print-grid">${cards.slice(i, i + perPage).join("")}</div>`);
  }

  $printSheets.innerHTML = `
    <div class="print-cover">
      <h1>Sight Word Flashcards</h1>
      <p>Montessori Grammar · ${currentFilter} · ${words.length} cards</p>
      <p>Print on cardstock · 6 cards per sheet · Cut along borders</p>
      <div class="print-key">${keyItems}</div>
    </div>
    ${pages.join("")}
  `;
}
$printBtn.addEventListener("click", () => {
  buildPrintSheets();
  setTimeout(() => window.print(), 50);
});

let legendOpen = false;
$legendToggle.addEventListener("click", () => {
  legendOpen = !legendOpen;
  $legend.className = "legend" + (legendOpen ? " open" : "");
  $legendToggle.textContent = (legendOpen ? "▴ Hide" : "▾ Show") + " Color Key";
});

// Theme toggle
const $themeToggle = document.getElementById("themeToggle");
$themeToggle.addEventListener("click", () => {
  isDark = !isDark;
  document.documentElement.setAttribute("data-theme", isDark ? "dark" : "light");
  $themeToggle.innerHTML = isDark ? "&#9790; Dark" : "&#9788; Light";
  M = getM();
  buildLegend();
  buildPills();
  render();
});

document.addEventListener("keydown", (e) => {
  if (e.key === " " || e.key === "Enter") { e.preventDefault(); flipCard(); }
  if (e.key === "ArrowRight" || e.key === "k") markKnown();
  if (e.key === "ArrowLeft" || e.key === "s") markLearning();
});

// ===== SWIPE GESTURES (mobile) =====
// Tap to flip, swipe right = known, swipe left = still learning.
(function attachSwipe() {
  let sx = 0, sy = 0, moved = false, tracking = false;
  const SWIPE_THRESHOLD = 60;   // px to commit a swipe
  const DRAG_MAX = 140;         // px where opacity reaches 0

  function activeCard() { return document.getElementById("theCard"); }

  $cardArea.addEventListener("touchstart", (e) => {
    const card = activeCard();
    if (!card || animating) return;
    const t = e.touches[0];
    sx = t.clientX; sy = t.clientY;
    moved = false; tracking = true;
    card.style.transition = "none";
  }, { passive: true });

  $cardArea.addEventListener("touchmove", (e) => {
    if (!tracking) return;
    const t = e.touches[0];
    const dx = t.clientX - sx, dy = t.clientY - sy;
    if (Math.abs(dx) > 8 || Math.abs(dy) > 8) moved = true;
    const card = activeCard();
    if (!card) return;
    // Only hijack horizontal drags — let vertical scroll pass through.
    if (Math.abs(dx) > Math.abs(dy)) {
      const o = Math.max(0.35, 1 - Math.abs(dx) / DRAG_MAX);
      const rot = dx / 30;
      card.style.transform = `translateX(${dx}px) rotate(${rot}deg)`;
      card.style.opacity = o;
    }
  }, { passive: true });

  $cardArea.addEventListener("touchend", (e) => {
    if (!tracking) return;
    tracking = false;
    const card = activeCard();
    const t = e.changedTouches[0];
    const dx = t.clientX - sx, dy = t.clientY - sy;
    const horizontal = Math.abs(dx) > Math.abs(dy);

    if (card) {
      card.style.transition = "transform 0.2s ease, opacity 0.2s ease";
      card.style.transform = "";
      card.style.opacity = "";
    }

    if (moved && horizontal && Math.abs(dx) > SWIPE_THRESHOLD) {
      if (dx > 0) markKnown(); else markLearning();
    } else if (!moved) {
      // Treat as a tap → flip. The click handler will also fire; guard it.
      swipeTapHandled = true;
      flipCard();
    }
  });

  $cardArea.addEventListener("touchcancel", () => {
    tracking = false;
    const card = activeCard();
    if (card) {
      card.style.transition = "transform 0.2s ease, opacity 0.2s ease";
      card.style.transform = "";
      card.style.opacity = "";
    }
  });
})();

// Suppress the synthetic click after a touch-tap so we don't double-flip.
let swipeTapHandled = false;
document.addEventListener("click", (e) => {
  if (swipeTapHandled && e.target.closest("#theCard")) {
    swipeTapHandled = false;
    e.stopPropagation();
    e.preventDefault();
  }
}, true);

// ===== INIT =====
buildLegend();
initDeck();
</script>
