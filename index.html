<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>First 100 Sight Words · Montessori Grammar</title>
<meta name="description" content="Interactive sight word flashcards with Montessori grammar color coding. The first 100 children's picture book sight words (Green et al., 2024).">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root{
    --bg:#ffffff; --card:#ffffff; --tx:#0f1419; --mu:#4a5560; --bd:#ebebeb;
    --soft:rgba(42,157,143,0.08); --pu:#2a9d8f; --pu-deep:#1f7a6f; --pi:#1f7a6f;
    --ag:#2a9d8f;
    --rainbow:#2a9d8f;
    --ff:'DM Sans',sans-serif;
    --fh:'DM Sans',sans-serif;
    --fm:'DM Sans',sans-serif;
    --fc:'DM Sans',sans-serif;
    --radius:18px;
    --shadow-sm:0 1px 2px rgba(40,36,32,.04),0 2px 6px rgba(40,36,32,.04);
    --shadow:0 2px 4px rgba(40,36,32,.04),0 8px 24px rgba(40,36,32,.06);
    --mint:#4f9c74;
  }

  /* Dark theme — teal hue */
  [data-theme="dark"] {
    --bg:#0d1b1a;
    --card:#142322;
    --tx:#e0edec;
    --mu:#a3bfbd;
    --bd:#1e3332;
    --soft:rgba(42,157,143,0.12);
    --pu:#3dbdad;
    --pu-deep:#5ed4c4;
    --shadow-sm:0 2px 8px rgba(0,0,0,.25);
    --shadow:0 4px 20px rgba(0,0,0,.4);
  }
  [data-theme="dark"] .btn-known { box-shadow: 0 3px 14px rgba(42,157,143,.3); }
  [data-theme="dark"] .btn-known:hover { box-shadow: 0 6px 22px rgba(42,157,143,.45); }
  [data-theme="dark"] .pill.active { box-shadow: 0 3px 10px rgba(42,157,143,.25); }

  html { -webkit-text-size-adjust: 100%; }
  body {
    min-height: 100vh;
    min-height: 100dvh;
    background: var(--bg);
    font-family: var(--ff);
    color: var(--tx);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px calc(32px + env(safe-area-inset-bottom));
    overflow-x: hidden;
    overscroll-behavior-y: contain;
    -webkit-tap-highlight-color: transparent;
    line-height: 1.55;
  }
  button { -webkit-tap-highlight-color: transparent; touch-action: manipulation; font-family: var(--ff); }

  /* Top & bottom rainbow strips — hidden */
  .rtn-rainbow {
    height: 0;
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 1000;
  }
  .rtn-rainbow.bottom { top: auto; bottom: 0; }

  .header { width: 100%; max-width: 680px; margin-bottom: 24px; }

  .title-row {
    display: flex; align-items: center;
    justify-content: space-between; margin-bottom: 10px;
    gap: 12px; flex-wrap: wrap;
  }
  .title-left { display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; }
  .title {
    font-family: var(--fh); font-size: 28px; font-weight: 700;
    letter-spacing: -0.01em; color: var(--tx);
    text-transform: none;
  }
  .subtitle {
    font-size: 10px; font-family: var(--fm);
    color: var(--pu); letter-spacing: 1.5px; text-transform: uppercase;
    font-weight: 700;
  }
  .review-badge {
    font-size: 10px; font-family: var(--fm);
    letter-spacing: 1.5px; text-transform: uppercase;
    font-weight: 700; color: var(--pu);
    padding: 4px 10px; border-radius: 999px;
    background: var(--soft);
    display: none;
  }
  .review-badge.visible { display: inline-block; }

  /* Pills (filter chips) */
  .pills { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
  .pill {
    padding: 6px 12px; border-radius: 999px;
    border: 1px solid var(--bd);
    background: var(--soft); color: var(--pu);
    cursor: pointer; font-size: 10px;
    font-family: var(--fm); font-weight: 700;
    letter-spacing: 1.5px; text-transform: uppercase;
    transition: all 0.2s; white-space: nowrap;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .pill:hover { border-color: var(--pu); color: var(--pu-deep); }
  .pill.active {
    background: var(--ag); color: #fff;
    border-color: transparent;
    box-shadow: 0 3px 10px rgba(42,157,143,.25);
  }
  .pill-dot {
    width: 7px; height: 7px; border-radius: 50%;
    display: inline-block; background: var(--pu);
  }

  /* Controls row */
  .controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; gap: 8px; flex-wrap: wrap; }
  .legend-toggle {
    background: var(--card);
    border: 1.5px solid var(--bd);
    border-radius: 999px;
    color: var(--tx);
    padding: 6px 14px; cursor: pointer;
    font-family: var(--fm); font-size: 10px; font-weight: 700;
    letter-spacing: 1.5px; text-transform: uppercase;
    transition: all 0.2s;
  }
  .legend-toggle:hover { border-color: var(--pu); color: var(--pu); }

  /* Legend */
  .legend {
    background: var(--card);
    border-radius: var(--radius);
    padding: 18px 22px;
    margin-bottom: 16px;
    border: 1px solid var(--bd);
    box-shadow: var(--shadow-sm);
    display: none;
  }
  .legend.open { display: block; }
  .legend-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 24px; }
  .legend-item { display: flex; align-items: center; gap: 10px; padding: 6px 0; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .legend-label {
    font-family: var(--fm); font-size: 10px; font-weight: 700;
    letter-spacing: 1.5px; text-transform: uppercase;
  }
  .legend-desc {
    font-family: var(--ff); font-size: 12px; color: var(--mu); margin-left: 8px;
  }

  /* Progress */
  .progress-track {
    height: 4px; background: var(--soft);
    border-radius: 2px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; border-radius: 2px;
    transition: width 0.4s ease, background 0.4s ease;
    background: var(--ag);
  }
  .progress-stats {
    display: flex; justify-content: space-between; margin-top: 10px;
    font-family: var(--fm); font-size: 10px; color: var(--mu);
    letter-spacing: 1.5px; text-transform: uppercase; font-weight: 700;
  }
  .stat-known { color: var(--mint); }
  .stat-learning { color: var(--pu); }

  /* Card */
  .card-area { width: 100%; max-width: 560px; }
  .card {
    width: 100%; aspect-ratio: 16/10;
    border-radius: var(--radius);
    background: var(--card);
    border: 1px solid var(--bd);
    box-shadow: var(--shadow);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    cursor: pointer; position: relative; overflow: hidden;
    transition: border-color 0.3s ease, box-shadow 0.3s ease;
    user-select: none; -webkit-user-select: none;
    touch-action: manipulation;
  }
  .card:hover { border-color: var(--pu); }
  .card-accent-bar {
    position: absolute; top: 0; left: 0; right: 0;
    height: 4px;
  }
  .card-number {
    position: absolute; top: 18px; left: 22px;
    font-family: var(--fm); font-size: 10px;
    font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--mu);
  }
  .card-pos {
    position: absolute; top: 18px; right: 22px;
    font-family: var(--fm); font-size: 10px;
    font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
  }
  .card-hint {
    position: absolute; bottom: 14px; right: 22px;
    font-family: var(--fm); font-size: 9px;
    font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--mu); opacity: 0.65;
  }
  .card-brand {
    position: absolute; bottom: 14px; left: 22px;
    font-family: var(--fm); font-size: 9px;
    font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--mu); opacity: 0.55;
  }
  .card-word {
    font-family: var(--fc); font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--tx);
    transition: all 0.3s ease;
    max-width: 92%; text-align: center; line-height: 1;
    word-break: break-word;
  }
  .card-word.short { font-size: clamp(56px, 16vw, 104px); }
  .card-word.long  { font-size: clamp(40px, 12vw, 76px); }
  .card-back { text-align: center; padding: 0 clamp(16px, 6vw, 40px); max-width: 100%; }
  .card-back-word {
    font-family: var(--fh); font-weight: 400; font-style: italic;
    font-size: clamp(16px, 4.5vw, 22px); color: var(--mu); margin-bottom: 10px;
  }
  .card-back-pos {
    font-family: var(--fm); font-size: 10px;
    font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
    margin-bottom: 18px;
  }
  .card-back-sentence {
    font-family: var(--fh); font-weight: 400;
    font-size: clamp(18px, 5.2vw, 28px); line-height: 1.4;
    color: var(--tx);
  }

  /* Done state */
  .done-card {
    width: 100%; aspect-ratio: 16/10;
    background: var(--card);
    border-radius: var(--radius);
    display: flex; flex-direction: column; align-items: center;
    justify-content: center;
    border: 1px solid var(--bd);
    box-shadow: var(--shadow);
    position: relative; overflow: hidden;
  }
  .done-card::before {
    content: ""; position: absolute; top: 0; left: 0; right: 0;
    height: 4px; background: var(--ag);
  }
  .done-emoji { font-size: 48px; margin-bottom: 14px; }
  .done-title {
    font-family: var(--fh); font-weight: 700; font-size: 30px;
    color: var(--tx); margin-bottom: 10px; letter-spacing: -0.01em;
  }
  .done-stats {
    font-family: var(--fm); font-size: 11px; color: var(--mu);
    margin-bottom: 24px; letter-spacing: 1.5px; text-transform: uppercase;
    font-weight: 700;
  }

  /* Buttons */
  .actions { display: flex; gap: 14px; margin-top: 24px; width: 100%; max-width: 560px; }
  .btn {
    padding: 12px 24px; border-radius: 12px; border: none; cursor: pointer;
    font-family: var(--ff); font-weight: 600; font-size: 14px;
    transition: all 0.2s;
    min-height: 48px;
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  }
  .btn:hover { transform: translateY(-2px); }
  .btn:active { transform: translateY(0); }
  .btn-learning {
    background: var(--card);
    color: var(--tx);
    border: 1.5px solid var(--bd);
    flex: 1;
  }
  .btn-learning:hover {
    border-color: var(--pu);
    color: var(--pu);
    box-shadow: var(--shadow-sm);
  }
  .btn-known {
    background: var(--ag);
    color: #fff;
    flex: 1;
    box-shadow: 0 3px 14px rgba(42,157,143,.3);
  }
  .btn-known:hover { box-shadow: 0 6px 22px rgba(42,157,143,.4); }

  .keyboard-hints {
    margin-top: 20px;
    font-family: var(--fm);
    font-size: 10px; color: var(--mu);
    letter-spacing: 1.5px; text-transform: uppercase; font-weight: 700;
    text-align: center;
  }

  /* Control group (right-aligned buttons in the controls row) */
  .control-group { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }

  /* Theme toggle (sun/moon) — sits inside .control-group as a .pill */
  #themeToggle {
    min-width: 36px; padding: 6px 10px;
    font-size: 14px; letter-spacing: 0;
    line-height: 1;
  }
  #themeToggle .theme-icon { display: inline-block; transform: translateY(-1px); }

  /* Traffic-light dot cluster on the Start Over button (kept neutral/purple) */
  .traffic-lights { display: inline-flex; gap: 3px; margin-right: 4px; }
  .traffic-lights .tl {
    width: 6px; height: 6px; border-radius: 50%;
    background: currentColor; opacity: 0.35;
    transition: opacity 0.25s, transform 0.25s;
  }
  #startOverBtn:hover .tl.r { background: #E63946; opacity: 1; }
  #startOverBtn:hover .tl.y { background: #E8A12D; opacity: 1; transition-delay: 0.08s; }
  #startOverBtn:hover .tl.g { background: var(--mint); opacity: 1; transition-delay: 0.16s; }
  #startOverBtn.flash .tl.r { background: #E63946; opacity: 1; animation: tlPulse 0.6s ease; }
  #startOverBtn.flash .tl.y { background: #E8A12D; opacity: 1; animation: tlPulse 0.6s ease 0.15s; }
  #startOverBtn.flash .tl.g { background: var(--mint); opacity: 1; animation: tlPulse 0.6s ease 0.3s; }
  @keyframes tlPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.6); } }

  /* Animations */
  @keyframes slideLeft { from { opacity:1; transform:translateX(0); } to { opacity:0; transform:translateX(-120px); } }
  @keyframes slideRight { from { opacity:1; transform:translateX(0); } to { opacity:0; transform:translateX(120px); } }
  @keyframes fadeIn { from { opacity:0; transform:scale(0.98); } to { opacity:1; transform:scale(1); } }
  .anim-enter { animation: fadeIn 0.3s ease-out; }
  .anim-exit-left { animation: slideLeft 0.3s ease-in forwards; }
  .anim-exit-right { animation: slideRight 0.3s ease-in forwards; }

  /* Footer marks */
  .rtn-mark {
    font-family: var(--fm);
    font-size: 10px;
    color: var(--mu);
    letter-spacing: 1.5px; text-transform: uppercase; font-weight: 700;
    margin-top: 14px;
    text-align: center;
  }
  .rtn-mark a { color: var(--pu); text-decoration: none; border-bottom: 1px solid var(--bd); }
  .rtn-mark a:hover { border-color: var(--pu); }

  .article-link {
    font-family: var(--fm); font-size: 10px;
    color: var(--mu); letter-spacing: 1.5px; text-transform: uppercase;
    font-weight: 700;
    text-decoration: none; border-bottom: 1px solid var(--bd);
  }
  .article-link:hover { color: var(--pu); border-color: var(--pu); }

  /* Print sheet (hidden on screen, visible when printing) */
  .print-sheets { display: none; }
  .print-sheets .print-cover {
    padding: 40px 32px; border-bottom: 2px solid #000;
  }
  .print-sheets .print-cover h1 {
    font-family: var(--fh); font-weight: 700;
    font-size: 28px; margin-bottom: 6px; color: #000;
    letter-spacing: -0.01em;
  }
  .print-sheets .print-cover p {
    font-family: var(--fm); font-size: 10px;
    color: #444; letter-spacing: 1.5px; margin-bottom: 4px;
    text-transform: uppercase; font-weight: 700;
  }
  .print-sheets .print-key {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 4px 14px; margin-top: 14px;
  }
  .print-sheets .print-key-item {
    display: flex; align-items: center; gap: 8px;
    font-family: var(--fm); font-size: 10px; color: #222;
    font-weight: 700; letter-spacing: 1px;
  }
  .print-sheets .print-key-dot {
    width: 10px; height: 10px; border-radius: 50%;
  }
  .print-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px; padding: 16px;
  }
  .print-card {
    border: 2px solid #000; border-radius: 10px;
    aspect-ratio: 3/2;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    position: relative; padding: 10px;
    page-break-inside: avoid; break-inside: avoid;
  }
  .print-card-bar {
    position: absolute; top: 6px; left: 10px; right: 10px; height: 3px; border-radius: 2px;
  }
  .print-card-num {
    position: absolute; top: 10px; left: 12px;
    font-family: var(--fm); font-size: 9px; font-weight: 700;
    letter-spacing: 1.5px; text-transform: uppercase;
  }
  .print-card-pos {
    position: absolute; top: 10px; right: 12px;
    font-family: var(--fm); font-size: 9px;
    font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
  }
  .print-card-word {
    font-family: var(--fc); font-weight: 700;
    font-size: 54px; letter-spacing: -0.02em; text-align: center;
  }
  .print-card-sent {
    position: absolute; bottom: 10px; left: 12px; right: 12px;
    font-family: var(--fh); font-size: 11px;
    text-align: center; font-style: italic;
  }

  @media print {
    @page { margin: 0.4in; size: letter; }
    body {
      background: #fff !important; color: #000 !important;
      padding: 0 !important; display: block !important;
    }
    .header, .card-area, .actions, .keyboard-hints, .rtn-rainbow, .rtn-mark,
    body > div:not(.print-sheets):not(.header) { display: none !important; }
    .print-sheets { display: block !important; }
    .print-grid { page-break-after: always; }
  }

  /* Reduced motion */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.001ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.001ms !important;
      scroll-behavior: auto !important;
    }
  }

  @media (max-width: 600px) {
    body { padding: 14px 12px calc(14px + env(safe-area-inset-bottom)); }
    .header { margin-bottom: 10px; }
    .title-row { margin-bottom: 8px; }
    .title { font-size: 22px; }
    .subtitle { display: none; }

    /* Horizontally scrollable filter pills (no wrap) */
    .pills {
      flex-wrap: nowrap;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scroll-snap-type: x proximity;
      margin: 0 -12px 8px;
      padding: 2px 12px 6px;
      scrollbar-width: none;
      gap: 6px;
      -webkit-mask-image: linear-gradient(90deg, transparent 0, #000 12px, #000 calc(100% - 12px), transparent 100%);
              mask-image: linear-gradient(90deg, transparent 0, #000 12px, #000 calc(100% - 12px), transparent 100%);
    }
    .pills::-webkit-scrollbar { display: none; }
    .pill { flex: 0 0 auto; scroll-snap-align: start; padding: 6px 11px; font-size: 10px; }

    .legend-grid { grid-template-columns: 1fr; }
    .btn { padding: 12px 14px; font-size: 13px; min-width: 0; }
    .actions { gap: 10px; margin-top: 16px; flex-direction: row; }
    .keyboard-hints { display: none; }

    .controls {
      flex-wrap: nowrap;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      margin: 0 -12px 8px;
      padding: 2px 12px 6px;
      gap: 6px;
      justify-content: flex-start;
      -webkit-mask-image: linear-gradient(90deg, transparent 0, #000 12px, #000 calc(100% - 12px), transparent 100%);
              mask-image: linear-gradient(90deg, transparent 0, #000 12px, #000 calc(100% - 12px), transparent 100%);
    }
    .controls::-webkit-scrollbar { display: none; }
    .legend-toggle { flex: 0 0 auto; padding: 6px 11px; font-size: 10px; }
    .control-group { flex: 0 0 auto; flex-wrap: nowrap; gap: 4px; }
    .control-group .pill { padding: 6px 9px; font-size: 9px; }

    .card-area, .actions { max-width: 480px; }
    .card, .done-card { aspect-ratio: 4 / 3; }
    .progress-stats { margin-top: 6px; font-size: 9px; }

    .card-number { top: 12px; left: 14px; font-size: 9px; }
    .card-pos { top: 12px; right: 14px; font-size: 9px; }
    .card-hint { bottom: 10px; right: 14px; font-size: 8px; letter-spacing: 1.5px; }
    .card-brand { display: none; }
    .card-accent-bar { height: 3px; }

    .done-emoji { font-size: 40px; margin-bottom: 10px; }
    .done-title { font-size: 24px; }
    .done-stats { font-size: 10px; margin-bottom: 18px; }
  }

  @media (max-width: 480px) {
    .card-word.short { font-size: clamp(44px, 14vw, 72px); }
    .card-word.long  { font-size: clamp(32px, 10vw, 56px); }
    .actions { flex-direction: column; gap: 8px; }
    .btn { width: 100%; }
  }

  @media (max-width: 380px) {
    .btn { padding: 12px 10px; font-size: 12px; }
    .card-back-word { margin-bottom: 4px; }
    .card-back-pos { margin-bottom: 10px; }
    .card-hint { display: none; }
  }
</style>
</head>
<body>

<div class="rtn-rainbow" aria-hidden="true"></div>

<div class="header" id="header">
  <div class="title-row">
    <div class="title-left">
      <h1 class="title">First 100 Sight Words</h1>
      <span class="subtitle">Montessori Grammar</span>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <span class="review-badge" id="reviewBadge">Review Round</span>
    </div>
  </div>

  <div class="pills" id="pills"></div>

  <div class="controls">
    <button class="legend-toggle" id="legendToggle">▾ Show Color Key</button>
    <div class="control-group">
      <button class="pill" id="startOverBtn" title="Reset the deck and clear progress">
        <span class="traffic-lights" aria-hidden="true"><span class="tl r"></span><span class="tl y"></span><span class="tl g"></span></span>
        Start Over
      </button>
      <button class="pill" id="trackBtn" title="Download a progress report (JSON)">⤓ Track</button>
      <button class="pill" id="printBtn" title="Print free flashcards">⎙ Print</button>
      <button class="pill" id="shuffleBtn" title="Reshuffle the current deck">↻ Shuffle</button>
      <button class="pill" id="themeToggle" title="Toggle light / dark" aria-label="Toggle light or dark theme"><span class="theme-icon">☾</span></button>
    </div>
  </div>

  <div class="legend" id="legend">
    <div class="legend-grid" id="legendGrid"></div>
  </div>

  <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-stats">
    <span id="countLabel">1 / 100</span>
    <span class="stat-known" id="knownLabel">✓ 0 known</span>
    <span class="stat-learning" id="learningLabel">↻ 0 learning</span>
  </div>
</div>

<div class="card-area" id="cardArea"></div>
<div class="actions" id="actions">
  <button class="btn btn-learning" id="btnLearning">← Still Learning</button>
  <button class="btn btn-known" id="btnKnown">Got It →</button>
</div>

<div class="print-sheets" id="printSheets" aria-hidden="true"></div>

<div class="keyboard-hints">Space to flip · ← / → to sort · K = know · S = still learning</div>
<div style="margin-top:16px;text-align:center;">
  <a href="https://ila.onlinelibrary.wiley.com/doi/epdf/10.1002/trtr.2309" target="_blank" rel="noopener" class="article-link">
    Based on Green et al., 2024 · Read the article →
  </a>
</div>
<div class="rtn-mark">RTN Communication &amp; Literacy · <a href="https://rachelslp.org" target="_blank" rel="noopener">rachelslp.org</a></div>

<div class="rtn-rainbow bottom" aria-hidden="true"></div>

<script>
// ===== DATA =====
const WORDS = [
  "the","and","a","to","I","you","in","of","it","he","is","was","for","on","that",
  "with","but","his","all","they","my","so","be","she","up","at","are","one","said",
  "what","this","when","we","me","have","as","do","like","out","can","her","not",
  "then","your","no","there","day","just","it's","see","little","time","from","had",
  "now","will","I'm","go","were","too","them","him","some","big","get","if","good",
  "don't","down","by","how","know","an","oh","more","their","could","about","back",
  "who","or","make","into","look","very","would","right","here","love","way","night",
  "did","new","come","our","two","want","made","over","around"
];

const WORD_POS = {
  "the":"article","and":"conjunction","a":"article","to":"preposition",
  "I":"pronoun","you":"pronoun","in":"preposition","of":"preposition",
  "it":"pronoun","he":"pronoun","is":"verb","was":"verb",
  "for":"preposition","on":"preposition","that":"pronoun",
  "with":"preposition","but":"conjunction","his":"pronoun",
  "all":"adjective","they":"pronoun","my":"pronoun","so":"adverb",
  "be":"verb","she":"pronoun","up":"adverb","at":"preposition",
  "are":"verb","one":"adjective","said":"verb","what":"pronoun",
  "this":"pronoun","when":"adverb","we":"pronoun","me":"pronoun",
  "have":"verb","as":"conjunction","do":"verb","like":"verb",
  "out":"adverb","can":"verb","her":"pronoun","not":"adverb",
  "then":"adverb","your":"pronoun","no":"adverb","there":"adverb",
  "day":"noun","just":"adverb","it's":"pronoun","see":"verb",
  "little":"adjective","time":"noun","from":"preposition","had":"verb",
  "now":"adverb","will":"verb","I'm":"pronoun","go":"verb",
  "were":"verb","too":"adverb","them":"pronoun","him":"pronoun",
  "some":"adjective","big":"adjective","get":"verb","if":"conjunction",
  "good":"adjective","don't":"verb","down":"adverb","by":"preposition",
  "how":"adverb","know":"verb","an":"article","oh":"interjection",
  "more":"adjective","their":"pronoun","could":"verb","about":"preposition",
  "back":"adverb","who":"pronoun","or":"conjunction","make":"verb",
  "into":"preposition","look":"verb","very":"adverb","would":"verb",
  "right":"adjective","here":"adverb","love":"verb","way":"noun",
  "night":"noun","did":"verb","new":"adjective","come":"verb",
  "our":"pronoun","two":"adjective","want":"verb","made":"verb",
  "over":"preposition","around":"preposition"
};

// Montessori grammar accent palette (used only as subtle accent bar on the card
// and as legend dots — the card body itself stays clean var(--card) white).
const M_PALETTE = {
  verb:         { accent:"#C62828" },
  noun:         { accent:"#555555" },
  adjective:    { accent:"#2A56B0" },
  article:      { accent:"#4A90B8" },
  pronoun:      { accent:"#7B3F9B" },
  preposition:  { accent:"#1E8A4A" },
  conjunction:  { accent:"#C07080" },
  adverb:       { accent:"#C07A10" },
  interjection: { accent:"#B8960A" }
};
const M_META = {
  verb:         { label:"VERB",         symbol:"●", desc:"Action word" },
  noun:         { label:"NOUN",         symbol:"▲", desc:"Person, place, or thing" },
  adjective:    { label:"ADJECTIVE",    symbol:"▲", desc:"Describing word" },
  article:      { label:"ARTICLE",      symbol:"△", desc:"Noun introducer" },
  pronoun:      { label:"PRONOUN",      symbol:"▲", desc:"Stand-in word" },
  preposition:  { label:"PREPOSITION",  symbol:"☽", desc:"Position & relation" },
  conjunction:  { label:"CONJUNCTION",  symbol:"▬", desc:"Connecting word" },
  adverb:       { label:"ADVERB",       symbol:"●", desc:"Modifier (how/when/where)" },
  interjection: { label:"INTERJECTION", symbol:"!", desc:"Exclamation" }
};

function getM() {
  const m = {};
  for (const k of Object.keys(M_META)) {
    m[k] = { ...M_META[k], ...M_PALETTE[k] };
  }
  return m;
}
let M = getM();

const SENTENCES = {
  "the":"Pass me the book.","and":"You and I can go.","a":"I saw a bird.",
  "to":"We need to leave.","I":"I will be there.","you":"Can you help?",
  "in":"She is in the room.","of":"A cup of water.","it":"Give it to me.",
  "he":"He ran fast.","is":"The sky is blue.","was":"She was happy.",
  "for":"This is for you.","on":"The cat is on the bed.","that":"Look at that!",
  "with":"Come with me.","but":"Small but strong.","his":"That is his coat.",
  "all":"We ate all of it.","they":"They went home.","my":"This is my turn.",
  "so":"I was so tired.","be":"Just be yourself.","she":"She left early.",
  "up":"Stand up now.","at":"Meet me at noon.","are":"You are kind.",
  "one":"Pick one color.","said":"He said hello.","what":"What happened?",
  "this":"Read this page.","when":"Call me when ready.","we":"We did it together.",
  "me":"Tell me more.","have":"I have time.","as":"Fast as lightning.",
  "do":"What do you think?","like":"I like this song.","out":"Go out and play.",
  "can":"You can do it.","her":"Give her the note.","not":"I am not sure.",
  "then":"Eat first, then go.","your":"Bring your bag.","no":"There is no rush.",
  "there":"Look over there.","day":"What a great day.","just":"Just keep going.",
  "it's":"It's almost done.","see":"I can see it now.","little":"A little more time.",
  "time":"It takes time.","from":"A note from home.","had":"She had a plan.",
  "now":"Start now.","will":"I will try again.","I'm":"I'm on my way.",
  "go":"Let's go outside.","were":"They were ready.","too":"Me too!",
  "them":"Help them out.","him":"Ask him first.","some":"Have some water.",
  "big":"That's a big step.","get":"Go get your coat.","if":"Tell me if you can.",
  "good":"Good job today.","don't":"I don't mind.","down":"Sit down here.",
  "by":"Stand by the door.","how":"How does this work?","know":"I know the answer.",
  "an":"Grab an apple.","oh":"Oh, I see now!","more":"Tell me more.",
  "their":"That's their choice.","could":"You could try.","about":"Think about it.",
  "back":"I'll be right back.","who":"Who said that?","or":"Now or later?",
  "make":"Let's make a plan.","into":"Walk into the room.","look":"Look at this!",
  "very":"That's very cool.","would":"I would like that.","right":"You're right.",
  "here":"Come over here.","love":"I love this place.","way":"Find a better way.",
  "night":"Good night.","did":"You did great.","new":"Try something new.",
  "come":"Come with us.","our":"This is our spot.","two":"Pick two options.",
  "want":"What do you want?","made":"She made it work.","over":"Start over fresh.",
  "around":"Look around you."
};

const FILTERS = [
  { name:"All Words", pos:null },
  { name:"Verbs", pos:"verb" },
  { name:"Pronouns", pos:"pronoun" },
  { name:"Adverbs", pos:"adverb" },
  { name:"Prepositions", pos:"preposition" },
  { name:"Adjectives", pos:"adjective" },
  { name:"Conjunctions", pos:"conjunction" },
  { name:"Articles", pos:"article" },
  { name:"Nouns", pos:"noun" }
];

// ===== STATE =====
let currentFilter = "All Words";
let deck = [];
let idx = 0;
let flipped = false;
let known = new Set();
let learning = new Set();
let mode = "study";
let animating = false;

// ===== HELPERS =====
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getFiltered(posKey) {
  if (!posKey) return [...WORDS];
  return WORDS.filter(w => WORD_POS[w] === posKey);
}

// ===== DOM REFS =====
const $pills = document.getElementById("pills");
const $legendToggle = document.getElementById("legendToggle");
const $legend = document.getElementById("legend");
const $legendGrid = document.getElementById("legendGrid");
const $shuffleBtn = document.getElementById("shuffleBtn");
const $progressFill = document.getElementById("progressFill");
const $countLabel = document.getElementById("countLabel");
const $knownLabel = document.getElementById("knownLabel");
const $learningLabel = document.getElementById("learningLabel");
const $cardArea = document.getElementById("cardArea");
const $actions = document.getElementById("actions");
const $btnLearning = document.getElementById("btnLearning");
const $btnKnown = document.getElementById("btnKnown");
const $reviewBadge = document.getElementById("reviewBadge");

// ===== BUILD UI =====
function buildPills() {
  $pills.innerHTML = "";
  FILTERS.forEach(f => {
    const btn = document.createElement("button");
    btn.className = "pill" + (currentFilter === f.name ? " active" : "");
    const pal = f.pos ? M[f.pos] : null;

    // Dot shows POS accent on inactive pills; active pill uses --ag gradient bg.
    if (pal && currentFilter !== f.name) {
      const dot = document.createElement("span");
      dot.className = "pill-dot";
      dot.style.background = pal.accent;
      btn.appendChild(dot);
    }

    btn.appendChild(document.createTextNode(f.name));
    btn.addEventListener("click", () => { currentFilter = f.name; initDeck(); });
    $pills.appendChild(btn);
  });
}

function buildLegend() {
  $legendGrid.innerHTML = "";
  Object.entries(M).forEach(([key, m]) => {
    const item = document.createElement("div");
    item.className = "legend-item";
    item.innerHTML = `
      <div class="legend-dot" style="background:${m.accent}"></div>
      <div>
        <span class="legend-label" style="color:${m.accent}">${m.symbol} ${m.label}</span>
        <span class="legend-desc">${m.desc}</span>
      </div>`;
    $legendGrid.appendChild(item);
  });
}

// ===== RENDER =====
function render() {
  const word = deck[idx];
  const pos = word ? WORD_POS[word] : "verb";
  const pal = M[pos];
  const total = deck.length;
  const progress = total > 0 ? (idx / total) * 100 : 0;
  const wordNum = word ? WORDS.indexOf(word) + 1 : 0;
  const done = total > 0 && idx >= total - 1 && learning.size === 0 && flipped;

  // Progress — bar uses --ag gradient globally (set in CSS), but we keep the POS
  // accent tint as a subtle override when a word is active.
  $progressFill.style.width = progress + "%";
  $countLabel.textContent = `${idx + 1} / ${total}`;
  $knownLabel.textContent = `✓ ${known.size} known`;
  $learningLabel.textContent = `↻ ${learning.size} learning`;

  // Review badge
  $reviewBadge.className = "review-badge" + (mode === "review" ? " visible" : "");

  // Card
  if (done) {
    $cardArea.innerHTML = `
      <div class="done-card">
        <div class="done-emoji">🎯</div>
        <div class="done-title">Deck Complete</div>
        <div class="done-stats">${known.size} mastered · ${learning.size} to review</div>
        <button class="btn btn-known" id="btnAgain">Go Again</button>
      </div>`;
    document.getElementById("btnAgain").addEventListener("click", initDeck);
    $actions.style.display = "none";
  } else if (word) {
    const sizeClass = word.length > 5 ? "long" : "short";
    if (!flipped) {
      $cardArea.innerHTML = `
        <div class="card anim-enter" id="theCard">
          <div class="card-accent-bar" style="background:${pal.accent}"></div>
          <span class="card-number">#${String(wordNum).padStart(3,"0")}</span>
          <span class="card-pos" style="color:${pal.accent}">${pal.symbol} ${pal.label}</span>
          <span class="card-hint">Tap to flip</span>
          <span class="card-brand">Montessori Grammar</span>
          <span class="card-word ${sizeClass}">${word}</span>
        </div>`;
    } else {
      $cardArea.innerHTML = `
        <div class="card anim-enter" id="theCard">
          <div class="card-accent-bar" style="background:${pal.accent}"></div>
          <span class="card-number">#${String(wordNum).padStart(3,"0")}</span>
          <span class="card-pos" style="color:${pal.accent}">${pal.symbol} ${pal.label}</span>
          <span class="card-hint">Example</span>
          <span class="card-brand">Montessori Grammar</span>
          <div class="card-back">
            <div class="card-back-word">${word}</div>
            <div class="card-back-pos" style="color:${pal.accent}">${pal.desc}</div>
            <div class="card-back-sentence">${SENTENCES[word]}</div>
          </div>
        </div>`;
    }
    document.getElementById("theCard").addEventListener("click", flipCard);
    $actions.style.display = "flex";
  }
}

// ===== ACTIONS =====
function initDeck() {
  const f = FILTERS.find(f => f.name === currentFilter);
  deck = shuffle(getFiltered(f ? f.pos : null));
  idx = 0; flipped = false;
  known = new Set(); learning = new Set();
  mode = "study";
  buildPills();
  render();
}

function flipCard() {
  if (animating) return;
  flipped = !flipped;
  render();
}

function advance(dir) {
  if (animating) return;
  animating = true;
  const card = document.getElementById("theCard");
  if (card) card.className = "card " + (dir === "left" ? "anim-exit-left" : "anim-exit-right");

  setTimeout(() => {
    flipped = false;
    animating = false;
    if (idx < deck.length - 1) {
      idx++;
    } else if (learning.size > 0 && mode === "study") {
      deck = shuffle([...learning]);
      idx = 0;
      learning = new Set();
      mode = "review";
    }
    render();
  }, 300);
}

function markKnown() {
  if (!deck[idx] || animating) return;
  known.add(deck[idx]);
  advance("right");
}

function markLearning() {
  if (!deck[idx] || animating) return;
  learning.add(deck[idx]);
  advance("left");
}

// ===== EVENTS =====
$btnKnown.addEventListener("click", markKnown);
$btnLearning.addEventListener("click", markLearning);
$shuffleBtn.addEventListener("click", initDeck);

// Start Over — full reset with a traffic-light pulse
const $startOverBtn = document.getElementById("startOverBtn");
$startOverBtn.addEventListener("click", () => {
  $startOverBtn.classList.add("flash");
  setTimeout(() => $startOverBtn.classList.remove("flash"), 900);
  initDeck();
});

// Track — download a JSON progress report (mirrors the planner app)
const $trackBtn = document.getElementById("trackBtn");
$trackBtn.addEventListener("click", () => {
  const f = FILTERS.find(f => f.name === currentFilter);
  const total = getFiltered(f ? f.pos : null).length;
  const report = {
    app: "Sight Word Flashcards",
    date: new Date().toISOString().split("T")[0],
    timestamp: new Date().toISOString(),
    filter: currentFilter,
    mode,
    progress: {
      position: Math.min(idx + 1, deck.length),
      deckSize: deck.length,
      totalInFilter: total,
      knownCount: known.size,
      learningCount: learning.size,
      percentKnown: total ? Math.round((known.size / total) * 100) : 0
    },
    known: [...known],
    learning: [...learning]
  };
  const stamp = report.date;
  const safeFilter = currentFilter.toLowerCase().replace(/\s+/g, "-");
  const blob = new Blob([JSON.stringify(report, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `sight-words-progress-${safeFilter}-${stamp}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
});

// Print — build a print-friendly sheet of every card in the current filter
const $printBtn = document.getElementById("printBtn");
const $printSheets = document.getElementById("printSheets");
function buildPrintSheets() {
  const f = FILTERS.find(f => f.name === currentFilter);
  const words = getFiltered(f ? f.pos : null);
  const keyItems = Object.entries(M_META).map(([key, meta]) => {
    const color = M_PALETTE[key].accent;
    return `<div class="print-key-item">
      <span class="print-key-dot" style="background:${color}"></span>
      <span><strong>${meta.symbol} ${meta.label}</strong> — ${meta.desc}</span>
    </div>`;
  }).join("");

  const cards = words.map(w => {
    const pos = WORD_POS[w];
    const pal = M_PALETTE[pos];
    const meta = M_META[pos];
    const num = WORDS.indexOf(w) + 1;
    return `<div class="print-card" style="border-color:${pal.accent}">
      <div class="print-card-bar" style="background:${pal.accent}"></div>
      <span class="print-card-num" style="color:${pal.accent}">#${String(num).padStart(3,"0")}</span>
      <span class="print-card-pos" style="color:${pal.accent}">${meta.symbol} ${meta.label}</span>
      <div class="print-card-word">${w}</div>
      <div class="print-card-sent" style="color:${pal.accent}">${SENTENCES[w]}</div>
    </div>`;
  });

  const pages = [];
  const perPage = 6;
  for (let i = 0; i < cards.length; i += perPage) {
    pages.push(`<div class="print-grid">${cards.slice(i, i + perPage).join("")}</div>`);
  }

  $printSheets.innerHTML = `
    <div class="print-cover">
      <h1>Sight Word Flashcards</h1>
      <p>Montessori Grammar · ${currentFilter} · ${words.length} cards</p>
      <p>Print on cardstock · 6 cards per sheet · Cut along borders</p>
      <div class="print-key">${keyItems}</div>
    </div>
    ${pages.join("")}
  `;
}
$printBtn.addEventListener("click", () => {
  buildPrintSheets();
  setTimeout(() => window.print(), 50);
});

let legendOpen = false;
$legendToggle.addEventListener("click", () => {
  legendOpen = !legendOpen;
  $legend.className = "legend" + (legendOpen ? " open" : "");
  $legendToggle.textContent = (legendOpen ? "▴ Hide" : "▾ Show") + " Color Key";
});

document.addEventListener("keydown", (e) => {
  if (e.key === " " || e.key === "Enter") { e.preventDefault(); flipCard(); }
  if (e.key === "ArrowRight" || e.key === "k") markKnown();
  if (e.key === "ArrowLeft" || e.key === "s") markLearning();
});

// ===== SWIPE GESTURES (mobile) =====
// Tap to flip, swipe right = known, swipe left = still learning.
(function attachSwipe() {
  let sx = 0, sy = 0, moved = false, tracking = false;
  const SWIPE_THRESHOLD = 60;   // px to commit a swipe
  const DRAG_MAX = 140;         // px where opacity reaches 0

  function activeCard() { return document.getElementById("theCard"); }

  $cardArea.addEventListener("touchstart", (e) => {
    const card = activeCard();
    if (!card || animating) return;
    const t = e.touches[0];
    sx = t.clientX; sy = t.clientY;
    moved = false; tracking = true;
    card.style.transition = "none";
  }, { passive: true });

  $cardArea.addEventListener("touchmove", (e) => {
    if (!tracking) return;
    const t = e.touches[0];
    const dx = t.clientX - sx, dy = t.clientY - sy;
    if (Math.abs(dx) > 8 || Math.abs(dy) > 8) moved = true;
    const card = activeCard();
    if (!card) return;
    // Only hijack horizontal drags — let vertical scroll pass through.
    if (Math.abs(dx) > Math.abs(dy)) {
      const o = Math.max(0.35, 1 - Math.abs(dx) / DRAG_MAX);
      const rot = dx / 30;
      card.style.transform = `translateX(${dx}px) rotate(${rot}deg)`;
      card.style.opacity = o;
    }
  }, { passive: true });

  $cardArea.addEventListener("touchend", (e) => {
    if (!tracking) return;
    tracking = false;
    const card = activeCard();
    const t = e.changedTouches[0];
    const dx = t.clientX - sx, dy = t.clientY - sy;
    const horizontal = Math.abs(dx) > Math.abs(dy);

    if (card) {
      card.style.transition = "transform 0.2s ease, opacity 0.2s ease";
      card.style.transform = "";
      card.style.opacity = "";
    }

    if (moved && horizontal && Math.abs(dx) > SWIPE_THRESHOLD) {
      if (dx > 0) markKnown(); else markLearning();
    } else if (!moved) {
      // Treat as a tap → flip. The click handler will also fire; guard it.
      swipeTapHandled = true;
      flipCard();
    }
  });

  $cardArea.addEventListener("touchcancel", () => {
    tracking = false;
    const card = activeCard();
    if (card) {
      card.style.transition = "transform 0.2s ease, opacity 0.2s ease";
      card.style.transform = "";
      card.style.opacity = "";
    }
  });
})();

// Suppress the synthetic click after a touch-tap so we don't double-flip.
let swipeTapHandled = false;
document.addEventListener("click", (e) => {
  if (swipeTapHandled && e.target.closest("#theCard")) {
    swipeTapHandled = false;
    e.stopPropagation();
    e.preventDefault();
  }
}, true);

// ===== THEME TOGGLE — site-wide via 'rtn-theme' key =====
(function initTheme(){
  const KEY = 'rtn-theme';
  const root = document.documentElement;
  const btn = document.getElementById('themeToggle');
  const icon = btn ? btn.querySelector('.theme-icon') : null;
  // Default to light; only switch to dark if the user has explicitly chosen it.
  let saved = null;
  try { saved = localStorage.getItem(KEY); } catch(e) {}
  const initial = saved === 'dark' ? 'dark' : 'light';
  root.setAttribute('data-theme', initial);
  const render = () => {
    const t = root.getAttribute('data-theme');
    if (icon) icon.textContent = t === 'dark' ? '☀' : '☾';
    if (btn) btn.title = t === 'dark' ? 'Switch to light' : 'Switch to dark';
  };
  render();
  if (btn) btn.addEventListener('click', () => {
    const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    root.setAttribute('data-theme', next);
    try { localStorage.setItem(KEY, next); } catch(e) {}
    render();
  });
})();

// ===== INIT =====
buildLegend();
initDeck();
</script>
</body>
</html>
